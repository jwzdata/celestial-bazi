[build]
  publish = "public"
  command = "npm install"

[functions]
  directory = "netlify/functions"
  node_bundler = "zisi"
  included_files = ["api/**"]

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self' https:;"

# Route /api/* to corresponding Netlify Functions
# This allows frontend code (auth.js /api/register etc.) to work without modifications
[[redirects]]
  from = "/api/register"
  to = "/.netlify/functions/register"
  status = 200

[[redirects]]
  from = "/api/login"
  to = "/.netlify/functions/login"
  status = 200

[[redirects]]
  from = "/api/user"
  to = "/.netlify/functions/user"
  status = 200

[[redirects]]
  from = "/api/preferences"
  to = "/.netlify/functions/preferences"
  status = 200

[[redirects]]
  from = "/api/pay/create"
  to = "/.netlify/functions/pay-create"
  status = 200

[[redirects]]
  from = "/api/pay/mock-success"
  to = "/.netlify/functions/pay-mock-success"
  status = 200

# Fallback all other requests to index.html (SPA support)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
